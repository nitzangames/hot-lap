<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Racing 2D</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #2d5a1e;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-user-select: none;
  user-select: none;
}
canvas {
  display: block;
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  touch-action: none;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="err" style="display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(200,0,0,0.9);color:#fff;font:14px monospace;padding:12px;max-height:40vh;overflow:auto;z-index:999;white-space:pre-wrap;"></div>
<script>
function logError(msg) {
  var el = document.getElementById('err');
  el.style.display = 'block';
  el.textContent += msg + '\n\n';
  try { fetch('/__log_error', { method: 'POST', body: msg }); } catch(e) {}
}
window.onerror = function(msg, src, line, col, err) {
  logError(msg + '\n  at ' + src + ':' + line + ':' + col + (err && err.stack ? '\n' + err.stack : ''));
};
window.addEventListener('unhandledrejection', function(e) {
  logError('Unhandled: ' + (e.reason && e.reason.stack ? e.reason.stack : e.reason));
});
</script>
<script type="module" src="js/main.js"></script>
</body>
</html>
