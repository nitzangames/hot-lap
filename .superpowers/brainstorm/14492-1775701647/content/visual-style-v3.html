<h2>Visual Style — Realistic with Flat Formula Car</h2>
<p class="subtitle">Minimalist flat-shaded car, walls on track edges, curbs on corners</p>

<div class="cards">
  <div class="card" data-choice="d-flat" onclick="toggleSelect(this)" style="max-width:420px;margin:0 auto;">
    <div class="card-image">
      <canvas id="mockD3" width="324" height="576" style="width:100%;height:auto;border-radius:6px;"></canvas>
    </div>
    <div class="card-body">
      <h3>Realistic + Flat Formula Car</h3>
      <p>Concrete walls, red/white curbs on corners, flat-shaded open-wheel car at 1/4 track width.</p>
    </div>
  </div>
</div>

<script>
(function() {
  const c = document.getElementById('mockD3');
  const ctx = c.getContext('2d');
  const w = 324, h = 576;

  const trackL = w * 0.22;
  const trackR = w * 0.78;
  const trackW = trackR - trackL;
  const trackCX = (trackL + trackR) / 2;
  const wallThick = 6;

  // --- Grass background ---
  ctx.fillStyle = '#4a7a2e';
  ctx.fillRect(0, 0, w, h);
  // Grass variation
  for (let i = 0; i < 300; i++) {
    ctx.fillStyle = `rgba(${35+Math.random()*25}, ${70+Math.random()*45}, ${15+Math.random()*15}, 0.25)`;
    const side = Math.random() < 0.5;
    const x = side ? Math.random() * (trackL - wallThick) : (trackR + wallThick) + Math.random() * (w - trackR - wallThick);
    ctx.fillRect(x, Math.random() * h, 2, 3);
  }

  // --- Asphalt ---
  ctx.fillStyle = '#3d3d3d';
  ctx.fillRect(trackL, 0, trackW, h);
  // Subtle noise
  for (let i = 0; i < 500; i++) {
    const g = 55 + Math.random() * 20;
    ctx.fillStyle = `rgba(${g},${g},${g},0.12)`;
    ctx.fillRect(trackL + Math.random() * trackW, Math.random() * h, 2, 2);
  }

  // --- Center dashes ---
  ctx.strokeStyle = 'rgba(255,255,255,0.35)';
  ctx.lineWidth = 2;
  ctx.setLineDash([16, 12]);
  ctx.beginPath();
  ctx.moveTo(trackCX, 0); ctx.lineTo(trackCX, h);
  ctx.stroke();
  ctx.setLineDash([]);

  // --- This is a corner section (bottom half curves) ---
  // Draw curbs on the inside of a right turn (left wall, bottom portion)
  const curbStart = h * 0.05;
  const curbEnd = h * 0.45;
  const curbWidth = 8;

  // Left side curbs (corner section)
  for (let y = curbStart; y < curbEnd; y += 10) {
    ctx.fillStyle = ((y - curbStart) / 10 | 0) % 2 === 0 ? '#cc2222' : '#eeeeee';
    ctx.fillRect(trackL, y, curbWidth, 10);
  }

  // Right side curbs (corner section)
  for (let y = curbStart; y < curbEnd; y += 10) {
    ctx.fillStyle = ((y - curbStart) / 10 | 0) % 2 === 0 ? '#cc2222' : '#eeeeee';
    ctx.fillRect(trackR - curbWidth, y, curbWidth, 10);
  }

  // --- Walls (concrete barriers) ---
  // Left wall
  ctx.fillStyle = '#888';
  ctx.fillRect(trackL - wallThick, 0, wallThick, h);
  // Wall top edge highlight
  ctx.fillStyle = '#aaa';
  ctx.fillRect(trackL - wallThick, 0, 2, h);
  // Wall segments
  ctx.strokeStyle = '#666';
  ctx.lineWidth = 1;
  for (let y = 0; y < h; y += 20) {
    ctx.beginPath();
    ctx.moveTo(trackL - wallThick, y);
    ctx.lineTo(trackL, y);
    ctx.stroke();
  }

  // Right wall
  ctx.fillStyle = '#888';
  ctx.fillRect(trackR, 0, wallThick, h);
  ctx.fillStyle = '#aaa';
  ctx.fillRect(trackR + wallThick - 2, 0, 2, h);
  ctx.strokeStyle = '#666';
  for (let y = 0; y < h; y += 20) {
    ctx.beginPath();
    ctx.moveTo(trackR, y);
    ctx.lineTo(trackR + wallThick, y);
    ctx.stroke();
  }

  // --- Flat formula car ---
  function drawFlatCar(cx, cy, carWidth, color, wingColor, alpha) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(cx, cy);

    const cw = carWidth;
    const ch = cw * 2.4;  // length to width ratio

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(-cw/2 + 2, -ch/2 + 2, cw, ch);

    // Rear tires
    const tireW = cw * 0.2;
    const tireH = cw * 0.5;
    ctx.fillStyle = '#222';
    ctx.fillRect(-cw/2 - tireW/2, ch/2 - tireH - cw*0.1, tireW, tireH);
    ctx.fillRect(cw/2 - tireW/2, ch/2 - tireH - cw*0.1, tireW, tireH);

    // Front tires
    ctx.fillRect(-cw/2 - tireW/2, -ch/2 + cw*0.15, tireW, tireH * 0.8);
    ctx.fillRect(cw/2 - tireW/2, -ch/2 + cw*0.15, tireW, tireH * 0.8);

    // Rear wing
    ctx.fillStyle = wingColor;
    ctx.fillRect(-cw/2 - tireW*0.3, ch/2 - cw*0.15, cw + tireW*0.6, cw * 0.12);

    // Front wing
    ctx.fillRect(-cw/2 - tireW*0.3, -ch/2, cw + tireW*0.6, cw * 0.08);

    // Main body
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(-cw*0.08, -ch/2 + cw*0.05);   // nose left
    ctx.lineTo(cw*0.08, -ch/2 + cw*0.05);    // nose right
    ctx.lineTo(cw*0.3, -ch/4);
    ctx.lineTo(cw*0.38, 0);
    ctx.lineTo(cw*0.38, ch/2 - cw*0.1);
    ctx.lineTo(-cw*0.38, ch/2 - cw*0.1);
    ctx.lineTo(-cw*0.38, 0);
    ctx.lineTo(-cw*0.3, -ch/4);
    ctx.closePath();
    ctx.fill();

    // Cockpit
    ctx.fillStyle = '#1a1a2a';
    ctx.fillRect(-cw*0.15, -ch*0.15, cw*0.3, ch*0.18);

    // Sidepods
    ctx.fillStyle = shadeColor(color, -25);
    ctx.fillRect(-cw*0.42, ch*0.02, cw*0.12, ch*0.22);
    ctx.fillRect(cw*0.3, ch*0.02, cw*0.12, ch*0.22);

    // Air intake
    ctx.fillStyle = '#222';
    ctx.fillRect(-cw*0.08, -ch*0.2, cw*0.16, cw*0.12);

    ctx.restore();
  }

  function shadeColor(hex, amt) {
    let r = parseInt(hex.slice(1,3),16) + amt;
    let g = parseInt(hex.slice(3,5),16) + amt;
    let b = parseInt(hex.slice(5,7),16) + amt;
    r = Math.max(0, Math.min(255, r));
    g = Math.max(0, Math.min(255, g));
    b = Math.max(0, Math.min(255, b));
    return `rgb(${r},${g},${b})`;
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.lineTo(x+w-r, y);
    ctx.quadraticCurveTo(x+w, y, x+w, y+r);
    ctx.lineTo(x+w, y+h-r);
    ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
    ctx.lineTo(x+r, y+h);
    ctx.quadraticCurveTo(x, y+h, x, y+h-r);
    ctx.lineTo(x, y+r);
    ctx.quadraticCurveTo(x, y, x+r, y);
    ctx.closePath();
  }

  // Car is 1/4 track width
  const carWidth = trackW * 0.25;

  // Player car
  drawFlatCar(trackCX + 8, h * 0.62, carWidth, '#cc1111', '#dd3333', 1.0);

  // Ghost car
  drawFlatCar(trackCX - 10, h * 0.32, carWidth, '#3366cc', '#4477dd', 0.35);

  // --- HUD ---
  ctx.shadowColor = '#000';
  ctx.shadowBlur = 5;
  ctx.textAlign = 'center';

  // Timer bg
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  roundRect(ctx, trackCX - 62, 8, 124, 28, 6);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 16px monospace';
  ctx.fillText('00:42.31', trackCX, 28);

  // Best
  ctx.fillStyle = 'rgba(100,180,255,0.8)';
  ctx.font = '11px monospace';
  ctx.fillText('BEST  00:41.87', trackCX, 46);

  // Speed bg
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  roundRect(ctx, trackCX - 48, h - 38, 96, 26, 6);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('287 km/h', trackCX, h - 19);

  ctx.shadowBlur = 0;
})();
</script>
