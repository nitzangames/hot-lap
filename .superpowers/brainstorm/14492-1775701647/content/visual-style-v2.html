<h2>Visual Style — Realistic with Formula Car</h2>
<p class="subtitle">Refined version of the realistic style with a detailed top-down formula car</p>

<div class="cards">
  <div class="card" data-choice="d-formula" onclick="toggleSelect(this)" style="max-width:400px;margin:0 auto;">
    <div class="card-image">
      <canvas id="mockD2" width="324" height="576" style="width:100%;height:auto;border-radius:6px;"></canvas>
    </div>
    <div class="card-body">
      <h3>D. Realistic + Formula Car</h3>
      <p>Asphalt track, grass, curbs, and a detailed top-down open-wheel car.</p>
    </div>
  </div>
</div>

<script>
(function() {
  const c = document.getElementById('mockD2');
  const ctx = c.getContext('2d');
  const w = 324, h = 576;

  // --- Background grass ---
  ctx.fillStyle = '#4a7a2e';
  ctx.fillRect(0, 0, w, h);
  for (let i = 0; i < 400; i++) {
    const g = 60 + Math.random() * 50;
    ctx.fillStyle = `rgba(${40+Math.random()*30}, ${80+Math.random()*50}, ${20+Math.random()*20}, 0.3)`;
    const x = Math.random() < 0.5 ? Math.random() * w * 0.25 : w * 0.75 + Math.random() * w * 0.25;
    ctx.fillRect(x, Math.random() * h, 2 + Math.random()*2, 3 + Math.random()*3);
  }

  const trackL = w * 0.26;
  const trackR = w * 0.74;
  const trackW = trackR - trackL;
  const trackCX = (trackL + trackR) / 2;

  // --- Asphalt ---
  ctx.fillStyle = '#3a3a3a';
  ctx.fillRect(trackL, 0, trackW, h);
  // Asphalt noise
  for (let i = 0; i < 800; i++) {
    const g = 50 + Math.random() * 25;
    ctx.fillStyle = `rgba(${g},${g},${g},0.15)`;
    ctx.fillRect(trackL + Math.random() * trackW, Math.random() * h, 1 + Math.random()*2, 1 + Math.random()*2);
  }

  // --- Curb strips ---
  for (let y = 0; y < h; y += 14) {
    ctx.fillStyle = y % 28 < 14 ? '#cc2222' : '#eeeeee';
    ctx.fillRect(trackL - 5, y, 7, 7);
    ctx.fillRect(trackR - 2, y, 7, 7);
  }

  // --- Center dashes ---
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 2;
  ctx.setLineDash([16, 12]);
  ctx.beginPath();
  ctx.moveTo(trackCX, 0); ctx.lineTo(trackCX, h);
  ctx.stroke();
  ctx.setLineDash([]);

  // --- Tire marks ---
  ctx.strokeStyle = 'rgba(25,25,25,0.2)';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(trackCX - 15, h);
  ctx.quadraticCurveTo(trackCX - 25, h*0.5, trackCX - 10, h*0.1);
  ctx.stroke();
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(trackCX - 5, h);
  ctx.quadraticCurveTo(trackCX - 15, h*0.5, trackCX, h*0.1);
  ctx.stroke();

  // --- Formula car drawing function ---
  function drawFormulaCar(cx, cy, scale, color, noseCone, wingColor, alpha) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(cx, cy);
    ctx.scale(scale, scale);

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.beginPath();
    ctx.ellipse(3, 3, 14, 34, 0, 0, Math.PI*2);
    ctx.fill();

    // Rear wing
    ctx.fillStyle = wingColor;
    ctx.fillRect(-16, 24, 32, 5);
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(-16, 28, 32, 1);

    // Rear wing endplates
    ctx.fillStyle = wingColor;
    ctx.fillRect(-17, 22, 4, 9);
    ctx.fillRect(13, 22, 4, 9);

    // Rear tires
    ctx.fillStyle = '#1a1a1a';
    roundRect(ctx, -18, 12, 8, 20, 2);
    ctx.fill();
    roundRect(ctx, 10, 12, 8, 20, 2);
    ctx.fill();
    // Tire tread marks
    ctx.strokeStyle = 'rgba(60,60,60,0.5)';
    ctx.lineWidth = 0.8;
    for (let ty = 14; ty < 30; ty += 3) {
      ctx.beginPath(); ctx.moveTo(-17, ty); ctx.lineTo(-11, ty); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(11, ty); ctx.lineTo(17, ty); ctx.stroke();
    }

    // Body (main chassis)
    const bodyGrad = ctx.createLinearGradient(-9, -30, 9, -30);
    bodyGrad.addColorStop(0, shadeColor(color, -20));
    bodyGrad.addColorStop(0.5, color);
    bodyGrad.addColorStop(1, shadeColor(color, -20));
    ctx.fillStyle = bodyGrad;
    ctx.beginPath();
    ctx.moveTo(-3, -32);    // nose tip left
    ctx.lineTo(3, -32);     // nose tip right
    ctx.lineTo(8, -20);     // widen
    ctx.lineTo(9, -5);
    ctx.lineTo(10, 10);     // sidepod start
    ctx.lineTo(10, 22);     // rear
    ctx.lineTo(-10, 22);
    ctx.lineTo(-10, 10);
    ctx.lineTo(-9, -5);
    ctx.lineTo(-8, -20);
    ctx.closePath();
    ctx.fill();

    // Cockpit
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.ellipse(0, -10, 5, 8, 0, 0, Math.PI*2);
    ctx.fill();
    // Cockpit rim
    ctx.strokeStyle = shadeColor(color, -30);
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.ellipse(0, -10, 5.5, 8.5, 0, 0, Math.PI*2);
    ctx.stroke();

    // Halo
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-4, -16);
    ctx.quadraticCurveTo(0, -20, 4, -16);
    ctx.stroke();

    // Driver helmet
    ctx.fillStyle = noseCone;
    ctx.beginPath();
    ctx.arc(0, -12, 3, 0, Math.PI*2);
    ctx.fill();

    // Sidepods
    ctx.fillStyle = shadeColor(color, -15);
    ctx.fillRect(-12, 0, 4, 14);
    ctx.fillRect(8, 0, 4, 14);

    // Air intake (above driver)
    ctx.fillStyle = '#222';
    ctx.fillRect(-2.5, -18, 5, 4);

    // Front wing
    ctx.fillStyle = wingColor;
    ctx.fillRect(-14, -29, 28, 3);
    // Front wing endplates
    ctx.fillRect(-15, -31, 3, 7);
    ctx.fillRect(12, -31, 3, 7);

    // Nose cone
    ctx.fillStyle = noseCone;
    ctx.beginPath();
    ctx.moveTo(-2, -32);
    ctx.lineTo(2, -32);
    ctx.lineTo(1, -36);
    ctx.lineTo(-1, -36);
    ctx.closePath();
    ctx.fill();

    // Front tires
    ctx.fillStyle = '#1a1a1a';
    roundRect(ctx, -20, -26, 7, 16, 2);
    ctx.fill();
    roundRect(ctx, 13, -26, 7, 16, 2);
    ctx.fill();
    // Front tire treads
    ctx.strokeStyle = 'rgba(60,60,60,0.5)';
    ctx.lineWidth = 0.8;
    for (let ty = -24; ty < -12; ty += 3) {
      ctx.beginPath(); ctx.moveTo(-19, ty); ctx.lineTo(-14, ty); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(14, ty); ctx.lineTo(19, ty); ctx.stroke();
    }

    // Front suspension arms
    ctx.strokeStyle = '#666';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-9, -22); ctx.lineTo(-14, -20);
    ctx.moveTo(-9, -18); ctx.lineTo(-14, -16);
    ctx.moveTo(9, -22); ctx.lineTo(14, -20);
    ctx.moveTo(9, -18); ctx.lineTo(14, -16);
    ctx.stroke();

    // Rear suspension
    ctx.beginPath();
    ctx.moveTo(-10, 16); ctx.lineTo(-14, 18);
    ctx.moveTo(-10, 20); ctx.lineTo(-14, 24);
    ctx.moveTo(10, 16); ctx.lineTo(14, 18);
    ctx.moveTo(10, 20); ctx.lineTo(14, 24);
    ctx.stroke();

    // Exhaust glow
    ctx.fillStyle = 'rgba(255,120,30,0.3)';
    ctx.beginPath();
    ctx.ellipse(0, 27, 3, 2, 0, 0, Math.PI*2);
    ctx.fill();

    ctx.restore();
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.lineTo(x+w-r, y);
    ctx.quadraticCurveTo(x+w, y, x+w, y+r);
    ctx.lineTo(x+w, y+h-r);
    ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
    ctx.lineTo(x+r, y+h);
    ctx.quadraticCurveTo(x, y+h, x, y+h-r);
    ctx.lineTo(x, y+r);
    ctx.quadraticCurveTo(x, y, x+r, y);
    ctx.closePath();
  }

  function shadeColor(hex, amt) {
    let r = parseInt(hex.slice(1,3),16) + amt;
    let g = parseInt(hex.slice(3,5),16) + amt;
    let b = parseInt(hex.slice(5,7),16) + amt;
    r = Math.max(0, Math.min(255, r));
    g = Math.max(0, Math.min(255, g));
    b = Math.max(0, Math.min(255, b));
    return `rgb(${r},${g},${b})`;
  }

  // --- Draw player car ---
  drawFormulaCar(trackCX + 5, h * 0.62, 2.2, '#cc1111', '#fff', '#dddddd', 1.0);

  // --- Draw ghost car (ahead, slightly offset) ---
  drawFormulaCar(trackCX - 12, h * 0.35, 2.2, '#3366cc', '#aaccff', '#aabbdd', 0.35);

  // --- HUD ---
  ctx.shadowColor = '#000';
  ctx.shadowBlur = 6;
  ctx.textAlign = 'center';

  // Timer background
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  roundRect(ctx, trackCX - 60, 8, 120, 28, 6);
  ctx.fill();

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 16px monospace';
  ctx.fillText('00:42.31', trackCX, 28);

  // Best time
  ctx.fillStyle = 'rgba(100,180,255,0.8)';
  ctx.font = '11px monospace';
  ctx.fillText('BEST  00:41.87', trackCX, 46);

  // Speed
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  roundRect(ctx, trackCX - 45, h - 36, 90, 24, 6);
  ctx.fill();

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('287 km/h', trackCX, h - 18);

  ctx.shadowBlur = 0;
})();
</script>
