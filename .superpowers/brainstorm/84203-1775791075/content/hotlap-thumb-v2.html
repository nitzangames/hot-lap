<h2>Hot Lap — Thumbnail A Revised</h2>
<p class="subtitle">Wings same color as body — click to select</p>

<div class="cards">
  <div class="card" data-choice="a" onclick="toggleSelect(this)" style="max-width:520px;margin:0 auto;">
    <div class="card-image"><canvas id="tA" width="512" height="512" style="width:100%;height:auto;border-radius:6px;"></canvas></div>
    <div class="card-body"><h3>Burning Rubber — Unified Color</h3><p>Wings, endplates, and body all in the same red</p></div>
  </div>
</div>

<script>
const S = 512;

function drawCar(ctx, x, y, angle, scale, color) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);
  ctx.scale(scale, scale);
  const w = 64, h = 141;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.ellipse(2, 2, w*0.5, h*0.4, 0, 0, Math.PI*2); ctx.fill();

  // Tires
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(-w*0.5, h*0.06, w*0.16, h*0.25);
  ctx.fillRect(w*0.34, h*0.06, w*0.16, h*0.25);
  ctx.fillRect(-w*0.46, -h*0.3, w*0.14, h*0.17);
  ctx.fillRect(w*0.32, -h*0.3, w*0.14, h*0.17);

  // Rear wing + endplates — SAME color as body
  ctx.fillStyle = color;
  ctx.fillRect(-w*0.55, h*0.38, w*1.1, h*0.04);
  ctx.fillRect(-w*0.55, h*0.22, w*0.06, h*0.18);
  ctx.fillRect(w*0.50, h*0.22, w*0.06, h*0.18);
  // Darker rear wing element
  ctx.fillStyle = darken(color, 30);
  ctx.fillRect(-w*0.50, h*0.31, w*1.0, h*0.03);

  // Body
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(0, -h*0.46); ctx.lineTo(w*0.2, -h*0.18); ctx.lineTo(w*0.26, h*0.05);
  ctx.lineTo(w*0.22, h*0.3); ctx.lineTo(-w*0.22, h*0.3); ctx.lineTo(-w*0.26, h*0.05);
  ctx.lineTo(-w*0.2, -h*0.18); ctx.closePath(); ctx.fill();

  // Sidepods slightly darker
  ctx.fillStyle = darken(color, 20);
  ctx.fillRect(-w*0.3, -h*0.02, w*0.08, h*0.18);
  ctx.fillRect(w*0.22, -h*0.02, w*0.08, h*0.18);

  // Cockpit
  ctx.fillStyle = '#111';
  ctx.fillRect(-w*0.1, -h*0.12, w*0.2, h*0.16);

  // Air intake
  ctx.fillStyle = darken(color, 40);
  ctx.fillRect(-w*0.05, -h*0.2, w*0.1, h*0.06);

  // Front wing — SAME color as body
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(-w*0.12, -h*0.38); ctx.lineTo(-w*0.468, -h*0.3);
  ctx.lineTo(-w*0.468, -h*0.33); ctx.lineTo(-w*0.12, -h*0.41); ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(w*0.12, -h*0.38); ctx.lineTo(w*0.468, -h*0.3);
  ctx.lineTo(w*0.468, -h*0.33); ctx.lineTo(w*0.12, -h*0.41); ctx.closePath(); ctx.fill();
  // Front endplates
  ctx.fillStyle = darken(color, 20);
  ctx.fillRect(-w*0.486, -h*0.35, w*0.05, h*0.08);
  ctx.fillRect(w*0.441, -h*0.35, w*0.05, h*0.08);

  // Nose highlight
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.beginPath();
  ctx.moveTo(0, -h*0.46); ctx.lineTo(w*0.08, -h*0.3);
  ctx.lineTo(-w*0.08, -h*0.3); ctx.closePath(); ctx.fill();

  ctx.restore();
}

function darken(hex, amt) {
  const r = Math.max(0, parseInt(hex.slice(1,3),16) - amt);
  const g = Math.max(0, parseInt(hex.slice(3,5),16) - amt);
  const b = Math.max(0, parseInt(hex.slice(5,7),16) - amt);
  return `rgb(${r},${g},${b})`;
}

(function() {
  const c = document.getElementById('tA');
  const ctx = c.getContext('2d');

  // Dark gradient background
  const bg = ctx.createRadialGradient(S*0.5, S*0.5, 0, S*0.5, S*0.5, S*0.7);
  bg.addColorStop(0, '#3a3a3a');
  bg.addColorStop(1, '#151515');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, S, S);

  // Curved track
  ctx.strokeStyle = '#4a4a4a';
  ctx.lineWidth = 120;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.arc(S*1.1, S*1.2, S*0.85, -Math.PI*0.85, -Math.PI*0.35);
  ctx.stroke();

  // Wall highlights
  ctx.strokeStyle = '#666';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.arc(S*1.1, S*1.2, S*0.85 + 58, -Math.PI*0.85, -Math.PI*0.35);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(S*1.1, S*1.2, S*0.85 - 58, -Math.PI*0.85, -Math.PI*0.35);
  ctx.stroke();

  // Red/white curb
  const curbSegs = 12;
  for (let i = 0; i < curbSegs; i++) {
    const a0 = -Math.PI*0.82 + (i/curbSegs) * Math.PI*0.47;
    const a1 = -Math.PI*0.82 + ((i+1)/curbSegs) * Math.PI*0.47;
    ctx.fillStyle = i % 2 === 0 ? '#cc2222' : '#eee';
    ctx.beginPath();
    ctx.arc(S*1.1, S*1.2, S*0.85 - 58, a0, a1);
    ctx.arc(S*1.1, S*1.2, S*0.85 - 72, a1, a0, true);
    ctx.closePath();
    ctx.fill();
  }

  // Heavy skid marks
  ctx.save();
  ctx.globalAlpha = 0.4;
  ctx.strokeStyle = '#111';
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.arc(S*1.1, S*1.2, S*0.85 - 25, -Math.PI*0.72, -Math.PI*0.48);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(S*1.1, S*1.2, S*0.85 + 15, -Math.PI*0.72, -Math.PI*0.48);
  ctx.stroke();
  ctx.restore();

  // Car mid-turn — unified red
  drawCar(ctx, S*0.42, S*0.38, 0.5, 3.0, '#e63030');

  // Heat glow
  ctx.save();
  ctx.globalAlpha = 0.15;
  const glow = ctx.createRadialGradient(S*0.5, S*0.55, 0, S*0.5, S*0.55, 120);
  glow.addColorStop(0, '#ff6600');
  glow.addColorStop(1, 'transparent');
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, S, S);
  ctx.restore();

  // Title
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 90px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('HOT', S*0.5, S*0.78);
  ctx.fillText('LAP', S*0.5, S*0.92);

  // Orange underline
  ctx.strokeStyle = '#ff4400';
  ctx.lineWidth = 6;
  ctx.beginPath();
  ctx.moveTo(S*0.25, S*0.97); ctx.lineTo(S*0.75, S*0.97);
  ctx.stroke();
})();
</script>
